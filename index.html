<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <header>
        <div class="bg-dark">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid top">
                    <a class="navbar-brand to-home" href="#"><img class="paperella" src="img/duck.png"
                            alt="Paperella"></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active text-light" href="#">Catalogo Libri</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Anagrafica Utenti</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Storico Prestiti</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Help</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    </header>
    <main>
        <div class="d-flex justify-content-between py-4 px-3">
            <h2 class="fw-light">Catalogo Libri</h2>
            <button class="fw-lighter bg-primary text-white rounded border-0 p-2">Aggiungi Libro</button>
        </div>
        <!-- Tabella -->
        <div>
            <table class="table table-tertiary table-striped">
                <thead>
                    <tr>
                        <th scope="col" class="col-6">Titolo</th>
                        <th scope="col" class="d-none d-lg-table-cell">Data prestito</th>
                        <th scope="col" class="col-4">Stato</th>
                        <th scope="col" class="col-2">Azioni</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Il Signore degli Anelli</td>
                        <td class="d-none d-md-table-cell">12/03/2026</td>
                        <td><span class="badge bg-success">Disponibile</span></td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-outline-primary">Modifica</button>
                        </td>
                    </tr>
                    <tr>
                        <td>1984</td>
                        <td class="d-none d-md-table-cell">10/03/2026</td>
                        <td><span class="badge bg-warning text-dark">In prestito</span></td>
                        <td class="">
                            <button><i class="bi bi-pencil-fill"></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
