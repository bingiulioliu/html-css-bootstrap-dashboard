<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style/index.css">
</head>

<body>
    <header>
        <div class="bg-dark">
            <nav class="navbar navbar-expand-lg">
                <div class="container-fluid top">
                    <a class="navbar-brand to-home" href="./index.html"><img class="paperella" src="img/duck.png"
                            alt="Paperella"></a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link active text-light" href="#">Catalogo Libri</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Anagrafica Utenti</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Storico Prestiti</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link text-secondary" href="#">Help</a>
                            </li>
                        </ul>
                    </div>
                    <!-- FORM Cerca -->
                    <!-- <div class="d-none d-lg-flex col-lg-3">
                        <form class="d-flex justify-content-flex-end gap-2">
                            <label for="searchbook" class="form-label">Cerca Libro</label>
                            <input type="text" class="form-control form-control-sm" aria-describedby="searchbook"
                                placeholder="Cerca...">
                            <button type="submit" class="btn btn-dark border-secondary btn-sm">Cerca</button>
                        </form>
                    </div>  -->
                </div>
            </nav>
        </div>
    </header>
    <main>
        <!-- FORM -->
        <form class="container mt-4">
            <!-- TITOLO -->
            <div class="row">
                <div class="">
                    <h3>Nuovo Libro</h3>
                </div>
            </div>
            <!-- Nome e Cognome autore -->
            <div class="row mt-4">
                <div class="col-6">
                    <label for="AuthorFirstName" class="form-label">Nome Autore</label>
                    <textarea class="form-control " id="AuthorFirstName" rows="1"
                        placeholder="Inserisci il nome dell'autore"></textarea>
                </div>
                <div class="col-6">
                    <label for="AuthorLastName" class="form-label">Cognome Autore</label>
                    <textarea class="form-control " id="AuthorLastName" rows="1" required
                        placeholder="Inserisci il cognome dell'autore"></textarea>
                </div>
            </div>
            <!-- Titolo libro -->
            <div class="row mt-4">
                <div class="col">
                    <label for="BookTitle" class="form-label">Titolo</label>
                    <textarea class="form-control " id="BookTitle" rows="1"
                        placeholder="Inserisci il titolo del libro" required></textarea>
                    <div id="BookTitle" class="form-text">Titolo versione italiana</div>
                </div>
            </div>
            <!-- Genere anno e ISBN -->
            <div class="row mt-4">
                <!-- Genere Libro -->
                <div class="col-12 col-lg-4">
                    <label for="BookGenre" class="form-label">Genere</label>
                    <select class="form-select" aria-label="Default select example">
                        <option selected>Scegli il genere</option>
                        <option value="narrativa">Narrativa Contemporanea</option>
                        <option value="giallo">Giallo e Investigativo</option>
                        <option value="thriller">Thriller e Noir</option>
                        <option value="fantasy">Fantasy</option>
                        <option value="fantascienza">Fantascienza</option>
                        <option value="horror">Horror</option>
                        <option value="romance">Rosa / Romance</option>
                        <option value="storico">Romanzo Storico</option>
                        <option value="biografia">Biografia e Memorie</option>
                        <option value="saggistica">Saggistica</option>
                        <option value="classici">Classici</option>
                        <option value="avventura">Avventura</option>
                    </select>
                </div>
                <!-- Anno di Pubblicazione -->
                <div class="col-12 mt-4 col-lg-4">
                    <label for="ReleaseDate" class="form-label">Anno di Pubblicazione</label>
                    <textarea class="form-control" id="ReleaseDate" rows="1" pattern="[0-9]+"
                        placeholder="Inserisci l'anno"></textarea>
                </div>
                <!-- ISBN# -->
                <div class="col-12 mt-4 col-lg-4">
                    <label for="ISBN" class="form-label">ISBN#</label>
                    <textarea class="form-control " id="ISBN" rows="1" required
                        placeholder="Inserisci il codice ISBN#"></textarea>
                </div>
            </div>
            <!-- Una riga -->
            <div class="row mt-4"></div>
            <hr>
            </div>
            <!-- Note -->
            <div class="row mt-4">
                <div class="col">
                    <label for="Note" class="form-label">Note</label>
                    <textarea class="form-control " id="Note" rows="3"
                        placeholder="Inserisci eventuali note sul libro"></textarea>
                </div>
            </div>
            <!-- Checkbox per versione libro anche in digitale -->
            <div class="row mt-4"></div>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                <label class="form-check-label" for="checkDefault">
                    Disponibile anche in digitale
                </label>
            </div>
            </div>
            <!-- Bottone submit "Aggiungi Libro" -->
            <div class="row mt-4 mb-5">
                <div class="col">
                    <button class="btn btn-primary" type="submit">Aggiungi Libro</button>
                </div>
            </div>
        </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
